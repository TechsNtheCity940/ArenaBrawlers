<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Brawler Online Prototype</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0c1220;
      color: #e8eefc;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #game {
      width: 1400px;
      height: 900px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #11192c 0%, #0a0f1d 100%);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
